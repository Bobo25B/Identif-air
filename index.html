<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Devine l'avion ✈️</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* tu peux supprimer ça si tu utilises style.css */
  </style>
</head>
<body>

<h1>✈️ Devine l'avion</h1>

<div id="filters">

  <!-- TYPES -->
  <div id="typeFilters" class="filter-group">
    <h3>Type d'avion</h3>

    <label><input type="checkbox" value="chasseur" checked> Chasseurs</label>
    <label><input type="checkbox" value="bombardier" checked> Bombardiers</label>
    <label><input type="checkbox" value="transport" checked> Transport</label>
    <label><input type="checkbox" value="helico" checked> Hélicoptères</label>
    <label><input type="checkbox" value="liner" checked> Avions de ligne</label>
  </div>

  <!-- NATIONALITÉS -->
  <div id="nationFilters" class="filter-group">
    <h3>Nationalité</h3>

    <label><input type="checkbox" value="france" checked> 🇫🇷 France</label>
    <label><input type="checkbox" value="usa" checked> 🇺🇸 USA</label>
    <label><input type="checkbox" value="russie" checked> 🇷🇺 Russie</label>
    <label><input type="checkbox" value="europe" checked> 🇪🇺 Europe</label>
    <label><input type="checkbox" value="chine" checked> 🇨🇳 Chine</label>
    <label><input type="checkbox" value="suede" checked> 🇸🇪 Suède</label>
    <label><input type="checkbox" value="japon" checked> 🇯🇵 Japon</label>
    <label><input type="checkbox" value="sc" checked> 🇰🇷 Corée du Sud</label>
    <label><input type="checkbox" value="inde" checked> 🇮🇳 Inde</label>
    <label><input type="checkbox" value="bresil" checked> 🇧🇷 Brésil</label>
  </div>

</div>

<div class="container">
  <img id="planeImage" src="" alt="Avion">
  <p id="result"></p>

  <button id="answerBtn">Voir la réponse</button>
  <button id="nextBtn">Suivant</button>
</div>

<script src="script.js"></script>
</body>
</html>
